<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avalie Team Icon Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <!-- Header & Tabs -->
  <header class="app-header">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
      </svg>
      <span class="brand-name">Avalie Team</span>
    </div>
    <div class="top-tabs">
      <button class="tab-btn active" data-tab="icons-view">Icons</button>
      <button class="tab-btn" data-tab="layouts-view">Layouts</button>
    </div>
  </header>

  <!-- ICONS VIEW -->
  <div id="icons-view" class="view-container active">
    <div class="search-header">
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="6.5" cy="6.5" r="5.5" /><line x1="10.5" y1="10.5" x2="15" y2="15" />
        </svg>
        <input type="text" id="search-input" placeholder="Search icons…" spellcheck="false" autocomplete="off" />
      </div>
      <div class="color-selector-container">
        <span class="color-label">Icon Color</span>
        <div class="color-presets">
          <button class="color-swatch active" data-color="#000000" style="background-color: #000000;" title="Black"></button>
          <button class="color-swatch" data-color="#ffffff" style="background-color: #ffffff; border: 1px solid var(--av-border);" title="White"></button>
          <button class="color-swatch" data-color="#4b5563" style="background-color: #4b5563;" title="Grey"></button>
          <button class="color-swatch" data-color="#2b5797" style="background-color: #2b5797;" title="Blue"></button>
          <button class="color-swatch" data-color="#d13438" style="background-color: #d13438;" title="Red"></button>
          <button class="color-swatch" data-color="#107c10" style="background-color: #107c10;" title="Green"></button>
          <div class="custom-color-control">
            <input type="color" id="custom-color-input" value="#000000" title="Custom Color" />
            <button class="color-swatch custom-swatch" id="custom-swatch-btn" title="Custom Color">
              <span class="rainbow-gradient"></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Pack Filters -->
    <div class="filters" id="filters"></div>

    <!-- Status Bar -->
    <div class="status-bar" id="status-bar" style="display:none;">
      <span><span class="result-count" id="result-count">0</span> results</span>
      <span class="result-cap" id="result-cap"></span>
    </div>

    <!-- Content Area -->
    <div id="content">
      <div class="state-message" id="welcome-state">
        <div class="state-icon">✦</div>
        <h3>Avalie Team Icon Vault</h3>
        <p>Search icons by keyword, then click to insert onto your slide.</p>
        <p class="hint">Shift+click to copy SVG to clipboard instead.</p>
      </div>
    </div>
  </div>

  <!-- LAYOUTS VIEW -->
  <div id="layouts-view" class="view-container" style="display:none;">
    <div id="layouts-gallery" class="layouts-grid"></div>
    
    <div id="layout-editor" style="display:none;">
      <button id="back-to-gallery" class="back-btn">← Back to Gallery</button>
      <div class="layout-preview-wrapper">
        <div id="layout-preview-container"></div>
      </div>
      <div class="editor-panel">
        <div id="layout-form" class="layout-form"></div>
        <div class="form-group">
          <label>Icon</label>
          <button id="open-icon-picker-btn" class="secondary-btn">Select Icon...</button>
        </div>
        <button id="insert-layout-btn" class="primary-btn">Insert Layout</button>
      </div>
    </div>
  </div>

  <!-- ICON PICKER MODAL -->
  <div id="icon-picker-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Select an Icon</h3>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="search-wrapper">
          <input type="text" id="modal-search-input" placeholder="Search icons..." spellcheck="false" autocomplete="off" />
        </div>
        <div id="modal-results" class="modal-icon-grid"></div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>
</body>
</html>
